
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tetris</title>
    <style>
        :root {
            --bg-color: #0a0a12;
            --accent-color: #00f2ff;
            --text-color: #ffffff;
            --panel-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            padding: 20px;
            border: 4px solid var(--accent-color);
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
            background: var(--panel-bg);
        }

        canvas {
            display: block;
            background-color: #000;
            border: 1px solid #333;
        }

        .ui-layer {
            position: absolute;
            top: 20px;
            right: -160px;
            text-align: left;
            width: 150px;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .stat-label {
            font-size: 14px;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        button {
            padding: 15px 30px;
            font-size: 20px;
            background: transparent;
            color: var(--accent-color);
            border: 2px solid var(--accent-color);
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            font-weight: bold;
        }

        button:hover {
            background: var(--accent-color);
            color: #000;
            box-shadow: 0 0 20px var(--accent-color);
        }

        .controls-hint {
            margin-top: 20px;
            font-size: 12px;
            opacity: 0.6;
            text-align: center;
        }

        @media (max-width: 600px) {
            .ui-layer {
                position: static;
                width: auto;
                margin-top: 10px;
                padding-left: 20px;
            }
            #game-container {
                padding: 10px;
            }
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="tetris" width="240" height="400"></canvas>
    
    <div class="ui-layer">
        <h1>Tetris</h1>
        <div class="stat-label">SCORE</div>
        <div id="score" class="stat-value">0</div>
        <div class="stat-label">LEVEL</div>
        <div id="level" class="stat-value">1</div>
    </div>

    <div id="overlay">
        <h2 id="status-text">NEON TETRIS</h2>
        <button id="start-btn">Start Game</button>
        <p class="controls-hint">Arrows to Move & Rotate<br>Down to Drop Faster</p>
    </div>
</div>

<script>
    const canvas = document.getElementById('tetris');
    const context = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const levelElement = document.getElementById('level');
    const startBtn = document.getElementById('start-btn');
    const overlay = document.getElementById('overlay');
    const statusText = document.getElementById('status-text');

    context.scale(20, 20);

    // Piece Definitions
    function createPiece(type) {
        if (type === 'I') {
            return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
        } else if (type === 'L') {
            return [[0, 2, 0], [0, 2, 0], [0, 2, 2]];
        } else if (type === 'J') {
            return [[0, 3, 0], [0, 3, 0], [1, 3, 3]];
        } else if (type === 'O') {
            return [[4, 4], [4, 4]];
        } else if (type === 'Z') {
            return [[5, 5, 0], [0, 5, 5], [0, 0, 0]];
        } else if (type === 'S') {
            return [[0, 6, 6], [1, 1, 0], [0, 0, 0]];
        } else if (type === 'T') {
            return [[0, 7, 0], [1, 1, 1], [0, 0, 0]];
        }
    }

    const colors = [
        null,
        '#00f2ff', // I
        '#ff9900', // L
        '#0033ff', // J
        '#ffff00', // O
        '#ff0000', // Z
        '#00ff00', // S
        '#cc00ff', // T
    ];

    function createMatrix(w, h) {
        const matrix = [];
        while (h--) {
            matrix.push(new Array(w).fill(0));
        }
        return matrix;
    }

    // Logic Functions
    function draw() {
        context.fillStyle = '#000';
        context.fillRect(0, 0, canvas.width, canvas.height);

        drawMatrix(arena, {x: 0, y: 0});
        drawMatrix(player.matrix, player.pos);
    }

    function drawMatrix(matrix, offset = {x: 0, y: 0}) {
        matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    context.fillStyle = colors[value];
                    context.fillRect(x + offset.x, y + offset.y, 1, 1);
                    // Add a small highlight for "3D" effect
                    context.strokeStyle = 'white';
                    context.lineWidth = 0.05;
                    context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                }
            });
        });
    }

    function merge(arena, player) {
        player.matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    arena[y + player.pos.y][x + player.pos.x] = value;
                }
            });
        });
    }

    function collide(arena, player) {
        const [m, o] = [player.matrix, player.pos];
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 &&
                   (arena[y + o.y] === undefined || arena[y + o.y][x + o.x] === undefined ||
                    arena[y + o.y][x + o.x] !== 0)) {
                    return true;
                }
            }
        }
        return false;
    }

    // Standard Rotation Logic Corrected:
    function rotateMatrix(matrix) {
        const rotated = matrix[0].map((_, i) => matrix.map(row => row[i]).reverse());
        return rotated;
    }

    function playerRotate() {
        const pos = player.pos.x;
        let offset = 1;
        const oldMatrix = player.matrix;
        player.matrix = rotateMatrix(player.matrix);
        while (collide(arena, player)) {
            player.pos.x += (player.pos.x > 10) ? -1 : 1; // Simple wall kick
            player.matrix = oldMatrix; // Revert if it hits a wall
            break;
        }
        if (collide(arena, player)) {
            player.matrix = oldMatrix;
        }
    }

    function arenaSweep() {
        let rowCount = 0;
        outer: for (let y = arena.length - 1; y > 0; --y) {
            for (let x = 0; x < arena[y].length; ++x) {
                if (arena[y][x] === 0) {
                    continue;
                }
            }
            const isFull = arena[y].every(cell => cell !== 0);
            if (isFull) {
                const row = arena.splice(y, 1)[0];
                arena.unshift(new Array(arena[0].length).fill(0));
                y++;
                rowCount++;
            }
        }
        if (rowCount > 0) {
            player.score += rowCount * 10;
            player.level = Math.floor(player.score / 100) + 1;
            updateStats();
        }
    }

    function updateStats() {
        scoreElement.innerText = player.score;
        levelElement.innerText = player.level;
    }

    const arena = createMatrix(12, 20);

    const player = {
        pos: {x: 0, y: 0},
        matrix: null,
        score: 0,
        level: 1,
    };

    function resetPlayer() {
        const pieces = 'ILJOTSZ';
        player.matrix = createPiece(pieces[Math.floor(Math.random() * pieces.length)]);
        player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
        player.pos.y = 0; // Fixed spawn position to top of screen
        
        // Check for immediate game over condition
        if (collide(arena, player)) {
            arena.forEach(row => row.fill(0));
            player.score = 0;
            player.level = 1;
            updateStats();
            overlay.style.display = 'flex';
            statusText.innerText = "GAME OVER";
        }
    }

    function playerDrop() {
        player.pos.y++;
        if (collide(arena, player)) {
            player.pos.y--;
            merge(arena, player);
            resetPlayer();
            arenaSweep();
        }
        dropCounter = 0;
    }

    function playerMove(dir) {
        player.pos.x += dir;
        if (collide(arena, player)) {
            player.pos.x -= dir;
        }
    }

    function moveDown() { // Fixed syntax error
        playerDrop();
    }

    let dropCounter = 0;
    let dropInterval = 1000;
    let lastTime = 0;

    function update(time = 0) {
        const deltaTime = time - lastTime;
        lastTime = time;

        dropCounter += deltaTime;
        const currentInterval = Math.max(100, dropInterval - (player.level * 50));
        
        if (dropCounter > currentInterval) {
            playerDrop();
        }

        draw();
        requestAnimationFrame(update);
    }

    document.addEventListener('keydown', (event) => {
        if (event.keyCode === 37) { // Left
            playerMove(-1);
        } else if (event.keyCode === 39) { // Right
            playerMove(1);
        } else if (event.keyCode === 40) { // Down
            playerDrop();
        } else if (event.keyCode === 38) { // Up (Rotate)
            playerRotate();
        }
    });

    function startGame() {
        arena.forEach(row => row.fill(0));
        player.score = 0;
        player.level = 1;
        updateStats();
        resetPlayer();
        overlay.style.display = 'none';
        requestAnimationFrame(update);
    }

    startBtn.addEventListener('click', () => {
        startGame();
    });
</script>
</body>
</html>
