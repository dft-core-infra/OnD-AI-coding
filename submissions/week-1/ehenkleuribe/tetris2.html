            .block {

                transition: background-color 0.1s;        
            }        
            .block-filled {            
                background-color: #333;       
            }        
            .game-over {            
                position: absolute;            
                top: 50%;            
                left: 50%;            
                transform: translate(-50%, -50%);           
                font-size: 24px;            
                color: red;            
                text-align: center;        
            }        
            .next-piece {            
                position: absolute;            
                top: 20px;            
                left: 50%;            
                transform: translateX(-50%);            
                display: flex;            
                justify-content: center;        
            }        
            .score {            
                position: absolute;            
                top: 10px;           
                right: 10px;            
                font-size: 18px;            
                color: #333;        
            }    
        </style>
